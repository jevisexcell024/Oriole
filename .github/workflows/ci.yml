name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
      # Dependency vulnerability gate. Fails the build only on CRITICAL advisories
      # so the known no-fix highs (xlsx/SheetJS, monaco→dompurify) don't block CI;
      # raise to --audit-level=high once those are resolved.
      - name: Dependency audit
        run: npm audit --audit-level=critical

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Free for public repos and personal accounts. For a GitHub *organization*
      # private repo, add a GITLEAKS_LICENSE secret.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
