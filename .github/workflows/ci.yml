name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
      # Dependency vulnerability gate. The known no-fix highs (xlsx/SheetJS,
      # monaco→dompurify) were resolved 2026-07-01 (SheetJS CDN build + a
      # dompurify override), so this is tightened to moderate — raise back to
      # critical only if a future no-fix advisory needs to be tolerated again.
      - name: Dependency audit
        run: npm audit --audit-level=moderate

  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      # GitHub Advanced Security (which the Security-tab upload depends on)
      # isn't available for private repos on a personal/free account — only for
      # public repos or paid Enterprise plans. The scan itself still runs and
      # its findings appear in this step's logs either way; continue-on-error
      # just stops the unavailable upload from failing the whole workflow.
      # Remove this once the repo is public or on a plan with GHAS for private
      # repos, so a real upload failure would go back to failing the build.
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Free for public repos and personal accounts. For a GitHub *organization*
      # private repo, add a GITLEAKS_LICENSE secret.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
